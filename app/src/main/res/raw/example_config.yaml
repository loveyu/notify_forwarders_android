# =============================================================================
# PhoneNotify 消息过滤配置 (ignore-filter)
# =============================================================================
# 用途: 屏蔽不需要推送的通知消息，基于应用名称 + 消息内容匹配
#
# 配置格式:
#   ignore-filter: 规则数组，每条规则包含 appName、regex、text 三个字段
#   appName: string              应用名称（必填），用于匹配消息来源
#   regex: string|string[]       正则表达式规则，支持单条或数组，使用 preg_match 匹配
#   text: string|string[]         纯文本规则，支持单条或数组，使用 strpos(, true) 匹配（忽略大小写）
#
# 匹配逻辑:
#   当 appName 匹配 AND (regex 任意匹配 OR text 任意匹配) 时，消息被忽略
#
# 空值说明:
#   regex 或 text 为空/省略时，该字段不参与匹配
#   空数组规则可不写，空字符串规则无效
#
# Unicode:
#   中文字符串作为 regex 模式时必须添加 u 修饰符: /pattern/u
# =============================================================================

ignore-filter:

  - appName: "Automate"
    regex: '/Running [\d]+ fibers/'

# =============================================================================
# API端点和超时配置 (api)
# =============================================================================
# 用途: 自定义API端点路径和超时时间，为空或省略时使用默认值
#
# 端点配置 (api.endpoints):
#   notify:           通知转发API端点，默认 /api/notify
#   clipboardText:    剪贴板文本API端点，默认 /api/notify/clipboard/text
#   clipboardImage:   剪贴板图片API端点，默认 /api/notify/clipboard/image
#   imageRaw:        相册图片API端点，默认 /api/notify/image/raw
#   version:         版本检查API端点，默认 /api/version
#
# 超时配置 (api.timeouts) - 单位为毫秒:
#   notify:
#     connect:  通知转发连接超时，默认 5000
#     read:     通知转发读取超时，默认 5000
#   clipboard:
#     connect:  剪贴板连接超时，默认 10000
#     read:     剪贴板读取超时，默认 10000
#   image:
#     connect:  图片连接超时，默认 10000
#     read:     图片读取超时，默认 10000
#   version:
#     connect:  版本检查连接超时，默认 5000
#     read:     版本检查读取超时，默认 5000
# =============================================================================

# api:
#   endpoints:
#     notify: "/api/notify"
#     clipboardText: "/api/notify/clipboard/text"
#     clipboardImage: "/api/notify/clipboard/image"
#     imageRaw: "/api/notify/image/raw"
#     version: "/api/version"
#   timeouts:
#     notify:
#       connect: 5000
#       read: 5000
#     clipboard:
#       connect: 10000
#       read: 10000
#     image:
#       connect: 10000
#       read: 10000
#     version:
#       connect: 5000
#       read: 5000

# =============================================================================
# 重复消息过滤配置 (dedup-filter)
# =============================================================================
# 用途: 过滤短时间内内容相同的重复通知消息
#       参考 PhoneNotifyProcessService 的去重逻辑，支持配置策略和时间窗口
#
# 全局配置:
#   enabled: bool         是否启用重复过滤，默认 false
#                         启用后默认对所有应用生效
#   onlyApps: bool        是否仅对 apps 列表中的应用生效，默认 false
#                         false: 所有应用都过滤，apps 列表用于覆盖策略
#                         true:  仅 apps 列表中的应用才会过滤
#   strategy: string      比较策略，默认 "title_content"
#     - "title_content":  比较 title 和 content 均相同（默认，与PHP端一致）
#     - "title":          仅比较 title
#     - "content":        仅比较 content
#   timeWindow: int       时间窗口（秒），默认 20
#                         在此时间内的相同消息将被忽略
#
# 按应用配置 (dedup-filter.apps):
#   可为特定应用覆盖全局策略和时间窗口
#   - packageName: string  应用包名（必填），支持精确匹配和前缀匹配
#                          精确匹配: "com.tencent.mm"
#                          前缀匹配: "com.tencent." （以 . 结尾匹配所有子包名）
#     strategy: string     覆盖策略（可选）
#     timeWindow: int      覆盖时间窗口（可选）
#
# 匹配逻辑:
#   1. 在 apps 列表中查找匹配当前 packageName 的配置
#   2. onlyApps=true 时，未匹配的应用直接放行
#   3. 使用匹配到的或全局默认的 strategy/timeWindow
#   4. 与该包名缓存的上一条消息按 strategy 比较
#   5. 在 timeWindow 内且匹配则忽略，否则更新缓存并放行
# =============================================================================

# dedup-filter:
#   enabled: true
#   strategy: "title_content"
#   timeWindow: 20
#   apps:
#     - packageName: "com.tencent.mm"
#       strategy: "title"
#       timeWindow: 30
#     - packageName: "com.tencent."    # 前缀匹配，所有腾讯应用
#       timeWindow: 10
#     - packageName: "org.telegram.messenger"
#       strategy: "content"

# =============================================================================
# 图标URL转换配置 (icon-url)
# =============================================================================
# 用途: 当发送通知图标开启时，将base64图标数据转换为远程URL
#       减少通知消息体积，避免重复传输相同图标
#
# 功能说明:
#   1. 通过MD5哈希检查远程是否已存在该图标
#   2. 不存在时上传图标到远程服务器
#   3. 使用本地缓存（内存+SQLite）避免重复请求
#
# 配置项:
#   enabled: bool             是否启用，默认 false
#   baseUrl: string           远程API基础地址（必填，如 https://api.example.com）
#   token: string             认证令牌（必填，发送请求时放在 x-auth-token 头）
#   tag: string               资源标签，默认 "phone-icon"
#   checkEndpoint: string     检查图标是否存在的端点，默认 /tools/resource/check
#   uploadEndpoint: string    上传图标的端点，默认 /tools/resource/upload-raw
#   headerAuthToken: string   认证令牌header名称，默认 x-auth-token
#   headerUploadTag: string   上传标签header名称，默认 x-upload-tag
#   headerUploadFilename: string 上传文件名header名称，默认 x-upload-filename
#   headerUploadFilesize: string 上传文件大小header名称，默认 x-upload-filesize
#   headerUploadSource: string  上传来源header名称，默认 x-upload-source
#   headerUploadDescription: string 上传描述header名称，默认 x-upload-description
#   filenameTemplate: string  上传文件名模板，默认 icon_{md5}.png
#                             支持变量: {md5}, {tag}, {appName}
#   descriptionTemplate: string 上传描述模板，默认 {appName}-通知图标
#                             支持变量: {appName}, {md5}, {tag}
#
# 缓存配置 (icon-url.cache):
#   memoryCache: bool         是否启用内存缓存，默认 true
#   memoryCacheSize: int      内存缓存最大条目数，默认 2000
#   sqliteCache: bool         是否启用SQLite持久化缓存，默认 true
#
# 检查接口请求:
#   POST {baseUrl}{checkEndpoint}
#   Header: {headerAuthToken}: {token}
#   Body: {"resources": [{"tag": "{tag}", "md5": "{iconMd5}"}]}
#   响应: {"success": true, "data": {"resources": [{"status": "exists", "url": "..."}]}}
#
# 上传接口请求:
#   POST {baseUrl}{uploadEndpoint}
#   Header: {headerAuthToken}: {token}, {headerUploadTag}: {tag}, {headerUploadFilename}: {filenameTemplate}
#           {headerUploadFilesize}: {size}, {headerUploadSource}: phone-api, {headerUploadDescription}: {descriptionTemplate}
#   Body: raw binary image data
#   响应: {"code": 0, "data": {"result": {"resource": {"url": "..."}}}}
# =============================================================================

# icon-url:
#   enabled: true
#   baseUrl: "https://api.example.com"
#   token: "your-auth-token"
#   tag: "phone-icon"
#   checkEndpoint: "/tools/resource/check"
#   uploadEndpoint: "/tools/resource/upload-raw"
#   headerAuthToken: "x-auth-token"
#   headerUploadTag: "x-upload-tag"
#   headerUploadFilename: "x-upload-filename"
#   headerUploadFilesize: "x-upload-filesize"
#   headerUploadSource: "x-upload-source"
#   headerUploadDescription: "x-upload-description"
#   filenameTemplate: "icon_{md5}.png"
#   descriptionTemplate: "{appName}-通知图标"
#   cache:
#     memoryCache: true
#     memoryCacheSize: 2000
#     sqliteCache: true

# =============================================================================
# 镜像目的地配置 (mirror)
# =============================================================================
# 用途: 将通知同时推送到多个目的地（镜像），与主服务器转发独立运行
#       镜像转发失败不影响主服务器转发，各镜像目的地之间也互不影响
#
# 配置格式:
#   mirror:
#     enabled: bool              是否启用镜像转发，默认 false
#     destinations: string|array 镜像目的地DSN，支持单个字符串或数组
#
# DSN 格式:
#   http[s]://[userinfo@]host[:port][/path_prefix][?param=value&...]
#
#   DSN 中的路径作为前缀，各端点路径追加到其后。
#   例如: http://mirror.example.com/proxy?retry=3
#     /api/notify                → http://mirror.example.com/proxy/api/notify
#     /api/notify/clipboard/text → http://mirror.example.com/proxy/api/notify/clipboard/text
#
#   支持所有转发端点: 通知转发、剪贴板文本、剪贴板图片、相册图片
#
# DSN 支持的查询参数:
#   connectTimeout: int   连接超时时间(ms)，默认 5000
#   writeTimeout:   int   写入/读取超时时间(ms)，默认 5000
#   retry:          int   重试次数，默认 0（不重试）
#   retryInterval:  int   重试间隔(ms)，默认 1000
#   token:          string 认证令牌，设置 Authorization: Bearer {token} 请求头
#   verifySSL:      bool  是否验证SSL证书，默认 true
#
# DSN 示例:
#   http://192.168.1.100:19283?connectTimeout=5000&retry=3
#   https://api.example.com?token=secret&verifySSL=false&retry=5
#   https://user:pass@api.example.com?retry=2&retryInterval=2000
#   http://mirror.example.com/proxy?connectTimeout=10000
# =============================================================================

# mirror:
#   enabled: true
#   destinations:
#     - "http://192.168.1.100:19283?connectTimeout=5000&writeTimeout=5000&retry=3&retryInterval=1000"
#     - "https://api.example.com?token=your-auth-token&verifySSL=false"
#   # 单个目的地也支持字符串格式:
#   # destinations: "http://192.168.1.100:19283"