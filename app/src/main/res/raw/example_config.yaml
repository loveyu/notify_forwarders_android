# =============================================================================
# PhoneNotify 消息过滤配置 (ignore-filter)
# =============================================================================
# 用途: 屏蔽不需要推送的通知消息，基于应用名称 + 消息内容匹配
#
# 配置格式:
#   ignore-filter: 规则数组，每条规则包含 appName、regex、text 三个字段
#   appName: string              应用名称（必填），用于匹配消息来源
#   regex: string|string[]       正则表达式规则，支持单条或数组，使用 preg_match 匹配
#   text: string|string[]         纯文本规则，支持单条或数组，使用 strpos(, true) 匹配（忽略大小写）
#
# 匹配逻辑:
#   当 appName 匹配 AND (regex 任意匹配 OR text 任意匹配) 时，消息被忽略
#
# 空值说明:
#   regex 或 text 为空/省略时，该字段不参与匹配
#   空数组规则可不写，空字符串规则无效
#
# Unicode:
#   中文字符串作为 regex 模式时必须添加 u 修饰符: /pattern/u
# =============================================================================

ignore-filter:

  - appName: "Automate"
    regex: '/Running [\d]+ fibers/'

# =============================================================================
# API端点和超时配置 (api)
# =============================================================================
# 用途: 自定义API端点路径和超时时间，为空或省略时使用默认值
#
# 端点配置 (api.endpoints):
#   notify:           通知转发API端点，默认 /api/notify
#   clipboardText:    剪贴板文本API端点，默认 /api/notify/clipboard/text
#   clipboardImage:   剪贴板图片API端点，默认 /api/notify/clipboard/image
#   imageRaw:        相册图片API端点，默认 /api/notify/image/raw
#   version:         版本检查API端点，默认 /api/version
#
# 超时配置 (api.timeouts) - 单位为毫秒:
#   notify:
#     connect:  通知转发连接超时，默认 5000
#     read:     通知转发读取超时，默认 5000
#   clipboard:
#     connect:  剪贴板连接超时，默认 10000
#     read:     剪贴板读取超时，默认 10000
#   image:
#     connect:  图片连接超时，默认 10000
#     read:     图片读取超时，默认 10000
#   version:
#     connect:  版本检查连接超时，默认 5000
#     read:     版本检查读取超时，默认 5000
# =============================================================================

# api:
#   endpoints:
#     notify: "/api/notify"
#     clipboardText: "/api/notify/clipboard/text"
#     clipboardImage: "/api/notify/clipboard/image"
#     imageRaw: "/api/notify/image/raw"
#     version: "/api/version"
#   timeouts:
